<div class="flex justify-center pt-6">
    <div class="max-w-4xl text-center w-full">

        <h1 class="text-[40px] md:text-[52px] font-bold mb-10 text-gray-800 leading-tight">
            {{ titlepage }}
        </h1>

        <div class="w-full space-y-10">
            {{ replicator_field }}

                <div>
                    
                    <h2 class="text-[28px] md:text-[34px] font-semibold text-gray-800 mb-3">
                        {{ title }}
                    </h2>

                    <p class="text-gray-600 max-w-2xl mx-auto mb-6">
                        {{ content }}
                    </p>

                    {{ if image }}
                        <img 
                            src="{{ image }}" 
                            alt="{{ title }}" 
                            class="mx-auto rounded-lg shadow-md 
                                w-[180px]
                                sm:w-[220px]
                                md:w-[300px]
                                lg:w-[380px]
                                h-auto mt-4"
                        >
                    {{ /if }}


                </div>

            {{ /replicator_field }}
        </div>

    </div>
</div>
